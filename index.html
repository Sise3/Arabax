<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;background:radial-gradient(circle at top,#072b70,#020617 55%,#000);color:white;display:flex;justify-content:center;align-items:center;padding:25px}
.card{width:100%;max-width:430px;text-align:center}
.icon{width:120px;height:120px;margin:0 auto 20px;border:2px solid #0284ff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:55px;box-shadow:0 0 45px #006cff}
h1{font-size:38px;margin-bottom:8px}
.sub{color:#aab4c8;font-size:19px;margin-bottom:28px}
.pay{display:flex;align-items:center;gap:22px;text-decoration:none;color:white;background:rgba(2,20,60,.72);border:1px solid #0077ff;border-radius:18px;padding:20px;margin:14px 0;box-shadow:0 0 22px rgba(0,119,255,.35)}
.money{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:38px;background:#031b38;border:1px solid #00d4ff;color:#43f5d6}
.pay strong{font-size:34px;display:block;text-align:left}
.pay span{color:#aab4c8;font-size:18px;display:block;text-align:left}
.arrow{margin-left:auto;font-size:36px;color:#1387ff}
.footer{margin-top:35px;color:#b8c2d6}
.footer .shield{font-size:42px;color:#147dff}
.note{font-size:14px;color:#7b8498;margin-top:8px}
</style>
</head>
<body>

<div class="card">
  <div class="icon">💳</div>
  <h1>Secure Payment</h1>
  <div class="sub">Choose payment amount</div>

  <a class="pay" href="#">
    <div class="money">$</div>
    <div><strong>50$</strong><span>Payment</span></div>
    <div class="arrow">›</div>
  </a>

  <a class="pay" href="#">
    <div class="money">$</div>
    <div><strong>100$</strong><span>Payment</span></div>
    <div class="arrow">›</div>
  </a>

  <a class="pay" href="#">
    <div class="money">$</div>
    <div><strong>200$</strong><span>Payment</span></div>
    <div class="arrow">›</div>
  </a>

  <a class="pay" href="#">
    <div class="money">$</div>
    <div><strong>1000$</strong><span>Payment</span></div>
    <div class="arrow">›</div>
  </a>

  <div class="footer">
    <div class="shield">🛡️</div>
    <b>Secure checkout</b>
    <div class="note">Payment opens after real payment links are connected.</div>
  </div>
</div>

</body>
</html>
