<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabax</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#111;
position:sticky;
top:0;
}

.logo{
font-size:32px;
font-weight:bold;
color:#d4af37;
}

.btn{
background:#d4af37;
color:black;
padding:12px 20px;
border:none;
border-radius:12px;
font-weight:bold;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(to bottom,#111,#050505);
}

.hero h1{
font-size:55px;
margin-bottom:20px;
}

.hero p{
max-width:600px;
color:#ccc;
margin-bottom:25px;
}

.search{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.search input{
padding:15px;
border-radius:12px;
border:none;
width:250px;
}

.cars{
padding:40px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
border:1px solid #222;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:20px;
}

.price{
color:#d4af37;
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:22px;
margin-bottom:15px;
}

.info{
color:#bbb;
margin-bottom:15px;
line-height:1.7;
}

.whatsapp{
display:block;
text-align:center;
background:#1db954;
padding:12px;
border-radius:12px;
font-weight:bold;
text-decoration:none;
color:white;
}

footer{
text-align:center;
padding:30px;
color:#777;
border-top:1px solid #222;
margin-top:50px;
}

</style>
</head>

<body>

<header>
<div class="logo">Arabax</div>

<button class="btn">
İlan Ver
</button>
</header>

<section class="hero">

<h1>
Premium Araç Pazarı
</h1>

<p>
Arabax ile aracını hızlı, güvenli ve premium şekilde satışa çıkar.
</p>

<div class="search">
<input type="text" placeholder="Marka / Model">
<input type="text" placeholder="Şehir">
<button class="btn">Ara</button>
</div>

</section>

<section class="cars">

<div class="card">

<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1200">

<div class="card-body">

<div class="price">
₺1.245.000
</div>

<div class="title">
Volkswagen Golf 7.5
</div>

<div class="info">
📍 Diyarbakır<br>
📅 2018<br>
🛣 142.000 KM
</div>

<a class="whatsapp" href="#">
WhatsApp ile Ara
</a>

</div>
</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1200">

<div class="card-body">

<div class="price">
₺965.000
</div>

<div class="title">
Toyota Corolla Hybrid
</div>

<div class="info">
📍 İstanbul<br>
📅 2020<br>
🛣 118.000 KM
</div>

<a class="whatsapp" href="#">
WhatsApp ile Ara
</a>

</div>
</div>

</section>

<footer>
© 2026 Arabax
</footer>

</body>
</html>
