<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGI CODE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at top,#5a3900,#000 60%);
color:white;
text-align:center;
position:relative;
}

h1{
font-size:58px;
line-height:1;
margin-bottom:16px;
text-shadow:0 0 25px #ffc400;
}

span{
color:#ffc400;
}

p{
font-size:18px;
color:#ddd;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:16px 34px;
border-radius:50px;
background:#ffc400;
color:#111;
font-weight:900;
text-decoration:none;
box-shadow:0 0 30px #ffc40088;
animation:pulse 1.5s infinite;
}

.coin{
position:absolute;
width:80px;
height:80px;
border-radius:50%;
background:radial-gradient(circle,#fff3b0,#ffc400,#9b6500);
box-shadow:0 0 35px #ffc400;
animation:float 4s infinite ease-in-out;
}

.c1{top:10%;left:10%}
.c2{top:18%;right:12%;animation-delay:1s}
.c3{bottom:12%;left:15%;animation-delay:2s}
.c4{bottom:16%;right:10%;animation-delay:3s}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-25px)}
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.08)}
}

.box{
position:relative;
z-index:2;
padding:20px;
}
</style>
</head>

<body>

<div class="coin c1"></div>
<div class="coin c2"></div>
<div class="coin c3"></div>
<div class="coin c4"></div>

<div class="box">
<h1>DIGI <span>CODE</span></h1>

<p>
PUBG UC • Valorant VP • Robux • Dijital Kod Market
</p>

<a class="btn" href="#">
WhatsApp Sipariş
</a>
</div>

</body>
</html>
