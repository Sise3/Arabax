<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGI CODE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{height:100vh;overflow:hidden;background:#020202;color:white}
.screen{height:100vh;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;padding:25px;background:radial-gradient(circle at 50% 25%,#5c3800,#050505 55%,#000)}
.light{position:absolute;width:260px;height:260px;border-radius:50%;background:#ffc40033;filter:blur(45px);animation:move 6s infinite alternate}
.l1{top:5%;left:10%}.l2{bottom:8%;right:8%;animation-delay:1s}
.coin{position:absolute;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,#fff3a0,#ffc400,#8b5700);box-shadow:0 0 35px #ffc400;animation:float 4s infinite ease-in-out}
.c1{top:12%;left:12%}.c2{top:22%;right:14%;animation-delay:1s}.c3{bottom:18%;left:18%;animation-delay:2s}.c4{bottom:14%;right:16%;animation-delay:3s}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-25px) rotate(15deg)}}
@keyframes move{0%{transform:translate(0,0)}100%{transform:translate(70px,40px)}}
.box{position:relative;z-index:5;max-width:420px;width:100%}
.logo{font-size:58px;font-weight:900;color:#ffc400;text-shadow:0 0 30px #ffc400;margin-bottom:12px}
.sub{font-size:18px;color:#ddd;line-height:1.5;margin-bottom:32px}
.btn{display:block;width:100%;padding:17px;border-radius:40px;text-decoration:none;font-weight:900;margin-bottom:14px}
.login{background:#ffc400;color:#111;box-shadow:0 0 30px #ffc40088;animation:pulse 1.8s infinite}
.guest{background:#151515;color:white;border:1px solid #444}
.safe{margin-top:24px;color:#aaa;font-size:14px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
</style>
</head>
<body>

<section class="screen">
<div class="light l1"></div>
<div class="light l2"></div>

<div class="coin c1"></div>
<div class="coin c2"></div>
<div class="coin c3"></div>
<div class="coin c4"></div>

<div class="box">
<div class="logo">DIGI CODE</div>
<div class="sub">PUBG UC • Valorant VP • Robux<br>Premium Dijital Kod Market</div>

<a class="btn login" href="#">Giriş Yap</a>
<a class="btn guest" href="#">Misafir Olarak Devam Et</a>

<div class="safe">⚡ Hızlı teslimat • 🔒 Güvenli sipariş • 💬 WhatsApp destek</div>
</div>
</section>

</body>
</html>
